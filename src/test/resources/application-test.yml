spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop  # <-- САМОЕ ВАЖНОЕ: создает таблицы при старте, удаляет при финише
    show-sql: true           # <-- Полезно: увидишь в логах SQL-запросы, которые делает Hibernate

  h2:
    console:
      enabled: true          # <-- Можно будет зайти на /h2-console и посмотреть данные во время теста
      path: /h2-console      # <-- Путь к консоли

  liquibase:
    enabled: false           # <-- Отключаем миграции Liquibase для тестов, чтобы не было конфликтов версий